<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getFirestore,
    collection,
    addDoc,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXPlrAFyG2D4jSqf-LHKVlfeOMGya49_Q",
    authDomain: "daily-games-80bb2.firebaseapp.com",
    projectId: "daily-games-80bb2",
    storageBucket: "daily-games-80bb2.firebasestorage.app",
    messagingSenderId: "877482348988",
    appId: "1:877482348988:web:f9e6ccf6bc13bc8d68dbb9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // SAVE MESSAGE
  async function saveChatMessage(name, text) {
    await addDoc(collection(db, "messages"), {
      name,
      text,
      time: Date.now()
    });
  }

  // LOAD MESSAGES
  async function loadMessages() {
    const snapshot = await getDocs(collection(db, "messages"));

    shared.messages = [];

    snapshot.forEach((doc) => {
      shared.messages.push(doc.data());
    });

    renderMessages();
  }

  // make functions available globally
  window.saveChatMessage = saveChatMessage;
  window.loadMessages = loadMessages;
</script>
